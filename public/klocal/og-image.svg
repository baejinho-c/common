<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-label="Taste Korea">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop stop-color="#E11D48"/>
    <stop offset="1" stop-color="#BE123C"/>
  </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="200" fill="#ffffff" opacity="0.08"/>
  <circle cx="180" cy="520" r="240" fill="#000000" opacity="0.08"/>
  <rect x="80" y="180" width="112" height="112" rx="28" fill="#ffffff" fill-opacity="0.15" stroke="#ffffff" stroke-opacity="0.2"/>
  <g transform="translate(80,180) scale(3.5)" filter="url(#glow)">
    <text x="16" y="21.12" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12.8" font-weight="700" fill="#ffffff">KR</text>
  </g>
  <text x="230" y="235" font-family="system-ui,sans-serif" font-size="68" font-weight="800" fill="#ffffff">Taste Korea</text>
  <text x="230" y="300" font-family="system-ui,sans-serif" font-size="30" fill="#ffffff" opacity="0.8">klocal.restyart.com</text>
  <text x="80" y="560" font-family="system-ui,sans-serif" font-size="22" fill="#ffffff" opacity="0.45">Powered by Restyart</text>
</svg>