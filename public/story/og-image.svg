  <g transform="translate(80,180) scale(3.5)" filter="url(#glow)">
    
      <rect x="9" y="13" width="11" height="7" rx="1.2" fill="#fff" opacity="0.92"/>
      <rect x="13" y="11" width="11" height="7" rx="1.2" fill="#fff" opacity="0.72"/>
      <path d="M11 22h10M16 22v3" stroke="#E9D5FF" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="19" cy="14" r="1" fill="#C4B5FD"/>
    
  </g>
  <text x="230" y="235" font-family="system-ui,sans-serif" font-size="68" font-weight="800" fill="#ffffff">Storyflow AI</text>
  <text x="230" y="300" font-family="system-ui,sans-serif" font-size="30" fill="#ffffff" opacity="0.8">story.restyart.com</text>
  <text x="80" y="560" font-family="system-ui,sans-serif" font-size="22" fill="#ffffff" opacity="0.45">Powered by Restyart</text>
