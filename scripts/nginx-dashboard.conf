# /etc/nginx/conf.d/resty-dashboard.conf
# dashboard.restyart.com → common 게이트웨이 대시보드 (:4000)
# app.restyart.com 은 변경하지 않음

server {
    listen 80;
    server_name dashboard.restyart.com;
    return 301 https://dashboard.restyart.com$request_uri;
}

server {
    listen 443 ssl;
    server_name dashboard.restyart.com;

    ssl_certificate /etc/letsencrypt/live/dashboard.restyart.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.restyart.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
