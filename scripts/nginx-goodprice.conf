# goodprice.restyart.com → resty-gateway :4000
# 적용: sudo cp common/scripts/nginx-goodprice.conf /etc/nginx/conf.d/goodprice-restyart.conf
#       sudo nginx -t && sudo certbot --nginx -d goodprice.restyart.com --non-interactive --agree-tos --email baeno@nate.com
#       sudo systemctl reload nginx

server {
    listen 80;
    server_name goodprice.restyart.com;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
