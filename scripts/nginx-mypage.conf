# mypage.restyart.com → common 게이트웨이 (:4000)

server {
    server_name mypage.restyart.com;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/mypage.restyart.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mypage.restyart.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = mypage.restyart.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name mypage.restyart.com;
    return 404;
}
