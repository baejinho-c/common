# 추가 published 테넌트 (도메인별 SSL 분리)

server {
    listen 443 ssl;
    server_name classic.restyart.com;
    ssl_certificate /etc/letsencrypt/live/classic.restyart.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/classic.restyart.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

