# wookwang.restyart.com → common 게이트웨이 (:4000)
# DNS A/CNAME → 서버 IP 후:
#   sudo certbot --nginx -d wookwang.restyart.com --non-interactive --agree-tos --email baeno@nate.com

server {
    listen 80;
    server_name wookwang.restyart.com;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# certbot 적용 후 HTTPS 블록·80→443 리다이렉트가 자동 추가됨
# ssl_certificate /etc/letsencrypt/live/wookwang.restyart.com/fullchain.pem
