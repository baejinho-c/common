<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Restyart Services Dashboard</title>
    <style>
      :root {
        --bg: #0f1419;
        --card: #1a2332;
        --border: #2d3a4f;
        --text: #e7ecf3;
        --muted: #8b9cb3;
        --ok: #22c55e;
        --warn: #f59e0b;
        --bad: #ef4444;
        --accent: #3b82f6;
      }
      * { box-sizing: border-box }
      body {
        font-family: system-ui, -apple-system, 'Noto Sans KR', sans-serif;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
      .wrap { max-width: 1400px; margin: 0 auto; padding: 20px 16px 48px }
      h1 { margin: 0 0 4px; font-size: 1.5rem }
      .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
        margin-bottom: 20px;
      }
      .stat {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
      }
      .stat b { display: block; font-size: 1.6rem; color: #fff }
      .stat span { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin-bottom: 16px;
      }
      .toolbar input, .toolbar select {
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 0.9rem;
      }
      .toolbar input { flex: 1; min-width: 180px }
      .btn {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 8px 14px;
        cursor: pointer;
        font-size: 0.85rem;
      }
      .btn:hover { opacity: 0.9 }
      .layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .layout.has-detail {
        grid-template-columns: 1fr minmax(280px, 360px);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 14px;
      }
      .card { cursor: pointer }
      .card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) }
      .detail-panel {
        display: none;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        position: sticky;
        top: 16px;
        max-height: calc(100vh - 32px);
        overflow-y: auto;
      }
      .layout.has-detail .detail-panel { display: block }
      .detail-panel h3 { margin: 0 0 12px; font-size: 1.1rem }
      .detail-panel .close {
        float: right;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: 6px;
        padding: 2px 8px;
        cursor: pointer;
        font-size: 0.8rem;
      }
      .detail-row { margin-bottom: 10px; font-size: 0.85rem }
      .detail-row label { display: block; color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px }
      .detail-links a { color: var(--accent); text-decoration: none; display: inline-block; margin-right: 12px; margin-top: 8px; font-size: 0.85rem }
      .detail-branding {
        display: flex;
        gap: 12px;
        margin: 12px 0;
        flex-wrap: wrap;
      }
      .detail-branding figure {
        margin: 0;
        text-align: center;
      }
      .detail-branding img {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        border: 1px solid var(--border);
        object-fit: cover;
        background: #0b1018;
      }
      .detail-branding .og-thumb {
        width: 120px;
        height: 63px;
        border-radius: 8px;
      }
      .detail-branding figcaption {
        font-size: 0.65rem;
        color: var(--muted);
        margin-top: 4px;
      }
      .seo-meter {
        height: 6px;
        background: #0b1018;
        border-radius: 3px;
        margin-top: 4px;
        overflow: hidden;
      }
      .seo-meter i {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, #22c55e, #3b82f6);
        border-radius: 3px;
      }
      .detail-preview {
        margin-top: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        height: 200px;
        background: #0b1018;
      }
      .detail-preview iframe {
        width: 200%;
        height: 200%;
        border: 0;
        transform: scale(0.5);
        transform-origin: 0 0;
        pointer-events: none;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .card-head {
        padding: 12px 14px 8px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 8px;
      }
      .card-head h2 {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .tenant-icon {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        object-fit: cover;
        flex-shrink: 0;
        background: #0b1018;
        border: 1px solid var(--border);
      }
      .tenant-icon.placeholder {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.65rem;
        font-weight: 700;
        color: var(--muted);
      }
      .title-row { min-width: 0; flex: 1 }
      .card-head h2 a { color: #fff; text-decoration: none }
      .card-head h2 a:hover { color: var(--accent) }
      .card-title { font-size: 0.75rem; color: var(--muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px }
      .badges { display: flex; flex-wrap: wrap; gap: 4px; justify-content: flex-end }
      .badge {
        font-size: 0.65rem;
        padding: 2px 7px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
      }
      .badge.ok { border-color: #166534; color: #86efac; background: #052e16 }
      .badge.bad { border-color: #7f1d1d; color: #fca5a5; background: #450a0a }
      .badge.warn { border-color: #78350f; color: #fcd34d; background: #422006 }
      .preview {
        position: relative;
        height: 180px;
        background: #0b1018;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
      }
      .preview iframe {
        width: 200%;
        height: 200%;
        border: 0;
        transform: scale(0.5);
        transform-origin: 0 0;
        pointer-events: none;
        background: #fff;
      }
      .preview-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.35);
        opacity: 0;
        transition: opacity 0.15s;
      }
      .card:hover .preview-overlay { opacity: 1 }
      .preview-overlay a {
        background: var(--accent);
        color: #fff;
        padding: 8px 16px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 0.85rem;
      }
      .card-foot {
        padding: 10px 14px 12px;
        font-size: 0.75rem;
        color: var(--muted);
      }
      .meter {
        height: 4px;
        background: #0b1018;
        border-radius: 2px;
        margin: 6px 0 4px;
        overflow: hidden;
      }
      .meter > i {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--accent), #8b5cf6);
        border-radius: 2px;
      }
      .issues { color: #fca5a5; margin-top: 4px }
      #loading { text-align: center; padding: 48px; color: var(--muted) }
      #error { color: var(--bad); padding: 16px; background: #450a0a; border-radius: 8px; margin-bottom: 16px; display: none }
      .legal {
        margin-top: 40px;
        border-top: 1px solid var(--border);
        padding-top: 16px;
        font-size: 12px;
        color: var(--muted);
      }
      .legal a { color: var(--accent) }
      .usage-panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      .usage-panel h2 { margin: 0 0 12px; font-size: 1rem }
      .usage-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin-bottom: 12px;
        font-size: 0.85rem;
        color: var(--muted);
      }
      .usage-toolbar label { display: flex; align-items: center; gap: 6px }
      .usage-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 8px;
      }
      .usage-item {
        background: #121a26;
        border-radius: 8px;
        padding: 10px;
      }
      .usage-item b { display: block; font-size: 1.25rem; color: #fff }
      .usage-item span { font-size: 0.7rem; color: var(--muted) }
      .usage-note { font-size: 0.75rem; color: var(--muted); margin-top: 10px }
      .usage-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 12px }
      .usage-table th, .usage-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); text-align: left }
      .usage-table th { color: var(--muted); font-weight: 500 }
      .badge.usage { background: #1e3a5f; color: #93c5fd }
      .detail-toggle {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        background: #121a26;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        color: var(--text);
        cursor: pointer;
        font-size: 0.82rem;
        margin-top: 10px;
        text-align: left;
      }
      .detail-toggle:hover { border-color: var(--accent) }
      .detail-toggle .count {
        font-size: 0.7rem;
        color: var(--muted);
        margin-left: auto;
        margin-right: 6px;
      }
      .detail-toggle-body {
        display: none;
        margin-top: 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        max-height: 280px;
        overflow-y: auto;
      }
      .detail-toggle-body.open { display: block }
      .page-list { list-style: none; margin: 0; padding: 0; font-size: 0.78rem }
      .page-list li {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 7px 10px;
        border-bottom: 1px solid var(--border);
      }
      .page-list li:last-child { border-bottom: 0 }
      .page-list a { color: var(--accent); text-decoration: none; word-break: break-all }
      .page-list a:hover { text-decoration: underline }
      .page-status {
        flex-shrink: 0;
        font-size: 0.65rem;
        padding: 1px 6px;
        border-radius: 999px;
        border: 1px solid var(--border);
      }
      .page-status.ok { color: #86efac; border-color: #166534 }
      .page-status.warn { color: #fcd34d; border-color: #78350f }
      .page-status.error { color: #fca5a5; border-color: #7f1d1d }
      .api-activation-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 6px;
        margin-top: 6px;
      }
      .api-activation-item {
        background: #121a26;
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 0.75rem;
      }
      .api-activation-item.on { border: 1px solid #166534 }
      .api-activation-item.off { border: 1px solid var(--border); opacity: 0.55 }
      .btn-secondary {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 0.8rem;
      }
      .btn-secondary:hover { border-color: var(--accent) }
      .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed }
      .api-test-result {
        margin-top: 8px;
        font-size: 0.78rem;
        padding: 8px 10px;
        border-radius: 8px;
        background: #121a26;
        border: 1px solid var(--border);
      }
      .api-test-result.ok { border-color: #166534; color: #86efac }
      .api-test-result.bad { border-color: #7f1d1d; color: #fca5a5 }
      .detail-issues { font-size: 0.78rem; color: #fca5a5; margin-top: 8px }
      @media (max-width: 900px) {
        .layout.has-detail { grid-template-columns: 1fr }
        .detail-panel { position: static; max-height: none }
      }
      @media (max-width: 600px) {
        .grid { grid-template-columns: 1fr }
        .preview { height: 140px }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Restyart Services Dashboard</h1>
      <p class="sub">배포된 서비스 상태 · 미리보기 · SEO · API 연동률 · 실사용량 집계</p>

      <div id="error"></div>
      <div id="loading">서비스 목록과 상태를 불러오는 중…</div>

      <div id="main" style="display:none">
        <div class="usage-panel" id="usage-panel">
          <h2>API / AI 사용량</h2>
          <div class="usage-toolbar">
            <label>기간
              <select id="usage-days">
                <option value="1">1일</option>
                <option value="7" selected>7일</option>
                <option value="30">30일</option>
              </select>
            </label>
            <label><input type="checkbox" id="usage-exclude-me" checked /> 내 IP 제외</label>
            <span id="usage-my-ip">IP 확인 중…</span>
            <button class="btn" type="button" id="usage-refresh" style="margin-left:auto">사용량 새로고침</button>
          </div>
          <div class="usage-grid" id="usage-stats"></div>
          <p class="usage-note" id="usage-note">서버 API 호출·AI 엔드포인트 요청을 테넌트·유저별로 집계합니다. 배포 이후부터 쌓입니다.</p>
          <div id="usage-top-endpoints"></div>
        </div>
        <div class="stats" id="stats"></div>
        <div class="toolbar">
          <input id="search" type="search" placeholder="서비스 검색…" />
          <select id="filter">
            <option value="all">전체</option>
            <option value="live">온라인만</option>
            <option value="seo-miss">SEO 미완</option>
            <option value="favicon-miss">파비콘 없음</option>
            <option value="og-miss">og:image 없음</option>
            <option value="seo-low">SEO 효율 낮음 (&lt;70%)</option>
            <option value="api-low">API 연동 낮음 (&lt;60%)</option>
            <option value="usage-high">사용량 많음 (7일)</option>
            <option value="page-problems">페이지 이슈 있음</option>
          </select>
          <button class="btn" id="refresh">새로고침</button>
        </div>
        <div class="layout" id="layout">
          <div class="grid" id="grid"></div>
          <aside class="detail-panel" id="detail-panel" aria-label="서비스 상세">
            <button type="button" class="close" id="detail-close">닫기</button>
            <div id="detail-content"></div>
          </aside>
        </div>
      </div>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
